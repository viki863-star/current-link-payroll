services:
  - type: web
    name: current-link-payroll
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python serve.py
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: REQUIRE_DATABASE_URL
        value: false
