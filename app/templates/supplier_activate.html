{% extends "base.html" %}

{% block body_class %}login-page-body{% endblock %}

{% block content %}
<section class="login-page-shell">
    <article class="card login-page-brand-card">
        <img class="login-page-brand" src="{{ url_for('static', filename='current-link-header-premium.png') }}" alt="{{ config['COMPANY_NAME'] }} logo">
        <div class="login-page-copy">
            <div class="public-page-topline">
                <a class="button button-secondary home-button" href="{{ url_for('home') }}">Home</a>
            </div>
            <p class="eyebrow">Supplier Access</p>
            <h2>Activate supplier portal</h2>
        </div>
    </article>

    <article class="card login-stage-card">
        <div class="login-stage-head">
            <p class="eyebrow">Step 1</p>
            <h3>Use invited details</h3>
        </div>
        <form method="post" class="stage-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>
                <span>Supplier Code</span>
                <input type="text" name="supplier_code" value="{{ values.supplier_code }}" placeholder="PTY-0001" required>
            </label>
            <label>
                <span>Registered Email</span>
                <input type="email" name="login_email" value="{{ values.login_email }}" placeholder="portal@example.com" required>
            </label>
            <label>
                <span>New Password</span>
                <input type="password" name="password" placeholder="Create password" required>
            </label>
            <label>
                <span>Confirm Password</span>
                <input type="password" name="confirm_password" placeholder="Repeat password" required>
            </label>
            <div class="login-stage-footer">
                <div class="login-tip">Activation is only for invited normal company suppliers.</div>
                <button class="button login-submit-button" type="submit">Activate Access</button>
            </div>
        </form>
    </article>
</section>
{% endblock %}
